<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/logo-arvore.ico">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&display=swap" rel="stylesheet">
    <title>Prantei - Blog de Viagens</title>
</head>
<body>

    <nav id="navbar">
        <a href="index.html"><img src="imagens/logo-arvore.png" alt="Início"></a>
        <ul>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="galeria.html">Galeria</a></li>
            <li><a href="quem-somos.html">Quem Somos</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
        <a href="registro.html" id="registro">Registre-se</a>
    </nav>

    <header id="banner">
        <img src="imagens/logo-arvore.png" alt="Prantei logo">
        <h1>Blog de Viagens</h1>
    </header>
    <main>
        <section id="registro">
            <div class="container">
                <h2>Registre-se</h2>
                <p>Receba nossa newsletter semanal</p>
                <form action="" method="get" id="formulario-registro">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" required placeholder="Digite seu nome completo">
    
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required placeholder="Digite seu e-mail">
    
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" required placeholder="Digite sua senha">
    
                    <button type="submit" class="botao">Registrar</button>
                </form>

            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <img src="imagens/logo-arvore.png" alt="Prantei logo">
            <p>&copy; PRANTEI - Blog de Viagens. Todos os direitos reservados.</p>
        </div>
    </footer>

</body>
</html>
